# Vistas Lovelace para los monitores de la familia (formato `sections`,
# HA 2024+). Incluye GPU + CPU + RAM en un solo `views:` para pegar de una
# vez en Settings → Dashboards → Edit dashboard → tres puntos → Raw
# configuration editor.
#
# Cada bloque "type: sections" referencia las entidades del paquete del
# monitor correspondiente. Si solo tienes GPU desplegado, borra los bloques
# CPU y RAM del final (las entidades aparecerían como unavailable).

views:
  - type: sections
    title: GPUs
    path: gpus
    icon: mdi:nvidia
    header:
      card:
        type: markdown
        text_only: true
        content: |
          # {{ states('sensor.gpu_monitor_host') }}
          Driver `{{ states('sensor.gpu_monitor_driver') }}` · CUDA `{{ states('sensor.gpu_monitor_cuda') }}` · {{ states('sensor.gpu_monitor_count') }} GPUs
    sections:
      - type: grid
        cards:
          - type: heading
            heading: GPU 0
            heading_style: title
            icon: mdi:expansion-card
          - type: gauge
            entity: sensor.gpu_0_utilization
            name: Utilización
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 60
              red: 85
          - type: gauge
            entity: sensor.gpu_0_memory_used_percent
            name: Memoria
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90
          - type: tile
            entity: sensor.gpu_0_temperature
          - type: tile
            entity: sensor.gpu_0_power_draw
          - type: tile
            entity: sensor.gpu_0_fan_speed
          - type: tile
            entity: sensor.gpu_0_memory_used
          - type: tile
            entity: sensor.gpu_0_memory_total
          - type: tile
            entity: sensor.gpu_0_top_process
          - type: tile
            entity: sensor.gpu_0_process_count
          - type: tile
            entity: sensor.gpu_0_name
          - type: tile
            entity: sensor.gpu_0_power_limit
          - type: tile
            entity: sensor.gpu_0_memory_utilization
          - type: history-graph
            hours_to_show: 6
            grid_options:
              columns: full
            entities:
              - sensor.gpu_0_utilization
              - sensor.gpu_0_memory_used_percent
              - sensor.gpu_0_temperature
              - sensor.gpu_0_power_draw

      - type: grid
        cards:
          - type: heading
            heading: GPU 1
            heading_style: title
            icon: mdi:expansion-card
          - type: gauge
            entity: sensor.gpu_1_utilization
            name: Utilización
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 60
              red: 85
          - type: gauge
            entity: sensor.gpu_1_memory_used_percent
            name: Memoria
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90
          - type: tile
            entity: sensor.gpu_1_temperature
          - type: tile
            entity: sensor.gpu_1_power_draw
          - type: tile
            entity: sensor.gpu_1_fan_speed
          - type: tile
            entity: sensor.gpu_1_memory_used
          - type: tile
            entity: sensor.gpu_1_memory_total
          - type: tile
            entity: sensor.gpu_1_top_process
          - type: tile
            entity: sensor.gpu_1_process_count
          - type: tile
            entity: sensor.gpu_1_name
          - type: tile
            entity: sensor.gpu_1_power_limit
          - type: tile
            entity: sensor.gpu_1_memory_utilization
          - type: history-graph
            hours_to_show: 6
            grid_options:
              columns: full
            entities:
              - sensor.gpu_1_utilization
              - sensor.gpu_1_memory_used_percent
              - sensor.gpu_1_temperature
              - sensor.gpu_1_power_draw

  - type: sections
    title: CPU
    path: cpu
    icon: mdi:cpu-64-bit
    header:
      card:
        type: markdown
        text_only: true
        content: |
          # {{ states('sensor.cpu_monitor_host') }}
          {{ states('sensor.cpu_monitor_model') }} · {{ states('sensor.cpu_monitor_physical_cores') }}c/{{ states('sensor.cpu_monitor_logical_cores') }}t · kernel `{{ states('sensor.cpu_monitor_kernel') }}`
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Estado
            heading_style: title
            icon: mdi:cpu-64-bit
          - type: gauge
            entity: sensor.cpu_usage
            name: Uso CPU
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 60
              red: 85
          - type: gauge
            entity: sensor.cpu_temperature
            name: Temperatura
            min: 20
            max: 100
            severity:
              green: 20
              yellow: 65
              red: 85
          - type: tile
            entity: sensor.cpu_frequency
          - type: tile
            entity: sensor.cpu_load_1m
          - type: tile
            entity: sensor.cpu_load_5m
          - type: tile
            entity: sensor.cpu_load_15m
          - type: tile
            entity: sensor.cpu_top_process
          - type: tile
            entity: sensor.cpu_process_count
          - type: tile
            entity: sensor.cpu_uptime
          - type: tile
            entity: sensor.cpu_primary_sensor
          - type: history-graph
            hours_to_show: 6
            grid_options:
              columns: full
            entities:
              - sensor.cpu_usage
              - sensor.cpu_temperature
              - sensor.cpu_frequency
              - sensor.cpu_load_1m

  - type: sections
    title: RAM
    path: ram
    icon: mdi:memory
    header:
      card:
        type: markdown
        text_only: true
        content: |
          # {{ states('sensor.ram_monitor_host') }}
          {{ states('sensor.ram_monitor_total') }} GiB total · kernel `{{ states('sensor.ram_monitor_kernel') }}`
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Memoria
            heading_style: title
            icon: mdi:memory
          - type: gauge
            entity: sensor.ram_used_percent
            name: Uso
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90
          - type: gauge
            entity: sensor.swap_used_percent
            name: Swap
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 30
              red: 70
          - type: tile
            entity: sensor.ram_used
          - type: tile
            entity: sensor.ram_available
          - type: tile
            entity: sensor.ram_free
          - type: tile
            entity: sensor.ram_cached
          - type: tile
            entity: sensor.ram_buffers
          - type: tile
            entity: sensor.swap_used
          - type: tile
            entity: sensor.swap_total
          - type: tile
            entity: sensor.ram_top_process
          - type: tile
            entity: sensor.ram_top_process_rss
          - type: tile
            entity: sensor.ram_process_count
          - type: history-graph
            hours_to_show: 6
            grid_options:
              columns: full
            entities:
              - sensor.ram_used_percent
              - sensor.ram_used
              - sensor.ram_cached
              - sensor.swap_used_percent
